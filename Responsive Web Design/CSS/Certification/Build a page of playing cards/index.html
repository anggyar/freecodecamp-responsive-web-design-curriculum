<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Playing Cards</title>
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>

  <body>
    <main id="playing-cards">
      <div class="card sekop">
        <div class="left">
          <div>A</div>
          <div>♠</div>
        </div>
        <div class="middle">
          <div>♠</div>
        </div>
        <div class="right reverse">
          <div>A</div>
          <div>♠</div>
        </div>
      </div>

      <div class="card love">
        <div class="left">
          <div>A</div>
          <div>♥</div>
        </div>
        <div class="middle">
          <div>♥</div>
        </div>
        <div class="right reverse">
          <div>A</div>
          <div>♥</div>
        </div>
      </div>

      <div class="card keriting">
        <div class="left">
          <div>A</div>
          <div>♣</div>
        </div>
        <div class="middle">
          <div>♣</div>
        </div>
        <div class="right reverse">
          <div>A</div>
          <div>♣</div>
        </div>
      </div>

      <div class="card wajik">
        <div class="left">
          <div>A</div>
          <div>♦</div>
        </div>
        <div class="middle">
          <div>♦</div>
        </div>
        <div class="right reverse">
          <div>A</div>
          <div>♦</div>
        </div>
      </div>

      <div class="card sekop">
        <div class="left">
          <div>4</div>
          <div>♠</div>
        </div>
        <div class="middle">
          <div>♠♠</div>
          <div class="reverse">♠♠</div>
        </div>
        <div class="right reverse">
          <div>A</div>
          <div>♠</div>
        </div>
      </div>
    </main>
  </body>
</html>
